name: Daily Telegram Brief

# Sends the evening brief at 9:00pm AEST.
#
# It first re-runs the IBKR realign (idempotent) so the brief is ALWAYS built on
# the live broker portfolio, then forces a fresh rebuild (?fresh=1) to bypass the
# brief's 4h cache. Self-contained: even if the 8:15pm realign job lagged or
# failed, the brief still reflects a just-run sync.
#
# Anchored to AEST (UTC+10) year-round, per the market-relative routine — it
# does NOT follow Sydney daylight saving.
#   9:00pm AEST == 11:00 UTC
#
# Requires repo secret CRON_SECRET matching the Railway CRON_SECRET variable.

on:
  schedule:
    - cron: "0 11 * * *"   # 9:00pm AEST (UTC+10)
  workflow_dispatch: {}     # manual run

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  send-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Realign then send the evening brief
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: https://web-production-ddb43.up.railway.app
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET repo secret is not set."
            exit 1
          fi

          echo "1/2 Realigning ledger to IBKR (idempotent)…"
          curl --fail --silent --show-error --max-time 90 \
            "${BASE_URL}/api/portfolio/sync-ibkr?secret=${CRON_SECRET}" || \
            echo "::warning::IBKR realign failed; sending brief on last-known ledger."

          echo "2/2 Building + sending fresh evening brief…"
          curl --fail --silent --show-error --max-time 300 \
            "${BASE_URL}/api/cron/daily-brief?fresh=1&secret=${CRON_SECRET}"
          echo
          echo "Brief sent."
