name: Nightly Portfolio Realign

# ~8:15pm AEST: realign the ledger to the actual IBKR portfolio, then capture
# the score snapshot + watchlist scan. GitHub's scheduler is best-effort, so we
# fire at TWO off-peak minutes for redundancy; both steps are idempotent, so a
# second run is harmless. (The 9pm brief also re-runs the realign as a final
# backstop.)
#
# AEST (UTC+10), no DST:  8:13pm = 10:13 UTC,  8:33pm = 10:33 UTC.
# Requires repo secret CRON_SECRET.

on:
  schedule:
    - cron: "13 10 * * *"  # 8:13pm AEST (primary)
    - cron: "33 10 * * *"  # 8:33pm AEST (redundant backstop)
  workflow_dispatch: {}

concurrency:
  group: nightly-realign
  cancel-in-progress: false

jobs:
  realign:
    runs-on: ubuntu-latest
    steps:
      - name: Realign to IBKR + snapshot
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: https://web-production-ddb43.up.railway.app
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET repo secret is not set."
            exit 1
          fi

          echo "1/2 Realigning ledger to IBKR…"
          curl --fail --silent --show-error --max-time 90 \
            "${BASE_URL}/api/portfolio/sync-ibkr?secret=${CRON_SECRET}"
          echo

          echo "2/2 Capturing nightly snapshot + watchlist scan…"
          curl --fail --silent --show-error --max-time 300 \
            "${BASE_URL}/api/cron/snapshot?secret=${CRON_SECRET}"
          echo
          echo "Realign + snapshot complete."
