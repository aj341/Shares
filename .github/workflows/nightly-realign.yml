name: Nightly Portfolio Realign

# 8:15pm AEST: realign the ledger to the actual IBKR portfolio (drops sold-out
# names, matches share counts/avg cost), then capture the score snapshot +
# watchlist scan. 15-min cushion past IBKR's 8pm data refresh. The 9pm brief
# then reanalyses this realigned book.
#
# Anchored to AEST (UTC+10) year-round (does NOT follow Sydney DST):
#   8:15pm AEST == 10:15 UTC
#
# Requires repo secret CRON_SECRET (Settings -> Secrets and variables ->
# Actions) matching the Railway CRON_SECRET variable.

on:
  schedule:
    - cron: "15 10 * * *"  # 8:15pm AEST (UTC+10)
  workflow_dispatch: {}

concurrency:
  group: nightly-realign
  cancel-in-progress: false

jobs:
  realign:
    runs-on: ubuntu-latest
    steps:
      - name: Realign to IBKR + snapshot
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: https://web-production-ddb43.up.railway.app
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET repo secret is not set (Settings -> Secrets and variables -> Actions)."
            exit 1
          fi

          echo "1/2 Realigning ledger to IBKR…"
          curl --fail --silent --show-error --max-time 90 \
            "${BASE_URL}/api/portfolio/sync-ibkr?secret=${CRON_SECRET}"
          echo

          echo "2/2 Capturing nightly snapshot + watchlist scan…"
          curl --fail --silent --show-error --max-time 300 \
            "${BASE_URL}/api/cron/snapshot?secret=${CRON_SECRET}"
          echo
          echo "Realign + snapshot complete."
